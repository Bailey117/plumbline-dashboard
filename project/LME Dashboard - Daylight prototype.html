<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Plumbline · Lead trading desk</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg, #F7F7F8); color: var(--text, #0B0B0F); font-family: "Geist", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  input[type="range"] { accent-color: var(--accent); }
  a { color: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes fadein  { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slidein { from { transform: translateX(100%) } to { transform: translateX(0) } }
  @keyframes popin   { from { transform: translate(-50%, -8px); opacity: 0 } to { transform: translate(-50%, 0); opacity: 1 } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="prototype/theme.jsx"></script>
<script type="text/babel" src="prototype/app_shell.jsx"></script>
<script type="text/babel" src="prototype/pages_main.jsx"></script>
<script type="text/babel" src="prototype/pages_detail.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useMemo } = React;
  const {
    AppShell, OverviewPage, SuppliersPage, StatesPage,
    SupplierDetailPage, RatesPage, FreightPage, ReportsPage,
    applyTheme, ACCENTS,
    useTweaks, TweaksPanel, TweakSection, TweakColor, TweakRadio, TweakToggle, TweakSelect,
  } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "indigo",
    "chartStyle": "area",
    "landing": "overview",
    "dark": false,
    "density": "comfortable"
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [route, setRoute] = useState({ name: tweaks.landing || "overview" });
    const [range, setRange] = useState("90D");

    // Apply theme tokens whenever tweaks change
    useEffect(() => { applyTheme(tweaks); }, [tweaks.accent, tweaks.dark, tweaks.density]);

    // Expose setRoute so deep buttons can navigate
    useEffect(() => { window.__appSetRoute = setRoute; }, []);

    let page;
    switch (route.name) {
      case "overview":  page = <OverviewPage  tweaks={tweaks} range={range} setRange={setRange}/>; break;
      case "suppliers": page = <SuppliersPage tweaks={tweaks}/>; break;
      case "supplier":  page = <SupplierDetailPage id={route.id} tweaks={tweaks}/>; break;
      case "states":    page = <StatesPage    tweaks={tweaks}/>; break;
      case "reports":   page = <ReportsPage   tweaks={tweaks}/>; break;
      case "freight":   page = <FreightPage   tweaks={tweaks}/>; break;
      case "rates":     page = <RatesPage     tweaks={tweaks}/>; break;
      default:          page = <OverviewPage  tweaks={tweaks} range={range} setRange={setRange}/>;
    }

    return (
      <>
        <AppShell tweaks={tweaks} setTweak={setTweak} route={route} setRoute={setRoute}>
          {page}
        </AppShell>

        <TweaksPanel>
          <TweakSection label="Theme"/>
          <TweakColor
            label="Accent"
            value={ACCENTS[tweaks.accent]?.solid}
            options={Object.values(ACCENTS).map(a => a.solid)}
            onChange={(v) => {
              const found = Object.entries(ACCENTS).find(([, a]) => a.solid === v);
              if (found) setTweak("accent", found[0]);
            }}
          />
          <TweakToggle label="Dark mode" value={tweaks.dark}
            onChange={(v) => setTweak("dark", v)}/>
          <TweakRadio label="Density" value={tweaks.density}
            options={["compact", "comfortable"]}
            onChange={(v) => setTweak("density", v)}/>

          <TweakSection label="Charts"/>
          <TweakRadio label="Chart style" value={tweaks.chartStyle}
            options={["line", "area", "candle"]}
            onChange={(v) => setTweak("chartStyle", v)}/>

          <TweakSection label="Defaults"/>
          <TweakSelect label="Landing page" value={tweaks.landing}
            options={["overview", "suppliers", "states", "reports", "rates"]}
            onChange={(v) => { setTweak("landing", v); setRoute({ name: v }); }}/>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
